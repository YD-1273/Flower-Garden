<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Where Feelings Bloom — a garden that blooms at your touch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#060a14;
    --bg-mid:#0f1a33;
    --moon:#cfe8ff;
    --gold:#e8c178;
    --ink:#eaf2ff;
    --ink-soft:rgba(207,232,255,0.55);
    --ink-faint:rgba(207,232,255,0.32);
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg-deep);
    overflow:hidden;
    font-family:'Jost', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  #scene-canvas{
    position:fixed; inset:0; display:block;
    width:100%; height:100%;
    touch-action:none;
    cursor: grab;
  }
  #scene-canvas.dragging{ cursor: grabbing; }

  #intro{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:15;
    background:
      radial-gradient(circle at 50% 42%, rgba(207,232,255,0.14), rgba(6,10,20,0.76) 34%, rgba(6,10,20,0.96) 72%),
      #060a14;
    transition: opacity 1.1s ease, visibility 1.1s ease;
  }
  #intro.entering{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  #intro-content{
    text-align:center;
    padding: 24px;
    width:min(92vw, 680px);
  }
  #intro-logo{
    margin:0;
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-style:italic;
    font-size: clamp(58px, 13vw, 132px);
    line-height:0.88;
    color: var(--ink);
    text-shadow: 0 0 22px rgba(207,232,255,0.48), 0 0 76px rgba(207,232,255,0.24);
  }
  #intro-tagline{
    margin: clamp(14px, 3vw, 24px) 0 30px;
    font-family:'Cormorant Garamond', serif;
    font-size: clamp(17px, 3.4vw, 27px);
    font-style:italic;
    color: var(--ink-soft);
  }
  #enter-btn{
    pointer-events:auto;
    border:1px solid rgba(232,193,120,0.48);
    background: rgba(12,18,32,0.42);
    color: var(--gold);
    font-family:'Jost', sans-serif;
    font-size: 12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    padding: 13px 24px;
    border-radius:999px;
    cursor:pointer;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 24px rgba(232,193,120,0.13);
    transition: color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
  }
  #enter-btn:hover,
  #enter-btn:focus-visible{
    color: var(--ink);
    border-color: rgba(207,232,255,0.68);
    box-shadow: 0 0 30px rgba(207,232,255,0.24);
    transform: translateY(-1px);
    outline:none;
  }
  body.intro-active #ui,
  body.intro-active #top-controls,
  body.cinematic #ui,
  body.cinematic #top-controls{
    opacity:0;
    visibility:hidden;
  }

  #ui{
    position:fixed; inset:0; pointer-events:none;
    display:flex; flex-direction:column; justify-content:space-between;
    padding: clamp(18px, 4vw, 46px);
    z-index:5;
  }
  .fade-in{ animation: fadeIn 1.6s ease forwards; opacity:0; }
  @keyframes fadeIn{ to{ opacity:1; } }

  #header{
    text-align:center;
    transition: opacity 1.4s ease;
  }
  #title{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-style:italic;
    font-size: clamp(28px, 5vw, 48px);
    letter-spacing:0.02em;
    color: var(--ink);
    text-shadow: 0 0 18px rgba(207,232,255,0.35), 0 0 46px rgba(207,232,255,0.12);
    margin:0;
  }
  #subtitle{
    margin-top:6px;
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-size: clamp(12px, 1.6vw, 15px);
    letter-spacing:0.08em;
    color: var(--ink-soft);
  }

  #footer{
    display:flex; align-items:flex-end; justify-content:space-between;
    gap: 16px;
  }
  #instructions{
    font-size: clamp(11px, 1.4vw, 13px);
    letter-spacing:0.04em;
    color: var(--ink-faint);
    transition: opacity 1.2s ease;
    max-width: 60vw;
  }
  #instructions span{ color: var(--ink-soft); }

  #counter{
    text-align:right;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size: clamp(13px, 1.8vw, 16px);
    color: var(--gold);
    text-shadow: 0 0 14px rgba(232,193,120,0.45);
    white-space:nowrap;
  }

  #top-controls{
    position:fixed; top: clamp(18px, 4vw, 46px); right: clamp(18px, 4vw, 46px);
    display:flex; gap:10px;
    pointer-events:none;
    z-index: 6;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  .ctrl-btn{
    pointer-events:auto;
    background: rgba(10,16,30,0.35);
    border: 1px solid rgba(207,232,255,0.22);
    color: var(--ink-soft);
    font-family:'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 9px 16px;
    border-radius: 999px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: all 0.3s ease;
    white-space: nowrap;
  }
  .ctrl-btn:hover{
    color: var(--ink);
    border-color: rgba(207,232,255,0.5);
    box-shadow: 0 0 18px rgba(207,232,255,0.18);
  }
  .ctrl-btn.active{
    color: var(--gold);
    border-color: rgba(232,193,120,0.6);
    box-shadow: 0 0 18px rgba(232,193,120,0.28);
  }

  #loading{
    position:fixed; inset:0; background:var(--bg-deep);
    display:flex; align-items:center; justify-content:center;
    z-index:20; transition: opacity 0.8s ease;
    font-family:'Cormorant Garamond', serif; font-style:italic;
    color: var(--ink-soft); font-size:15px; letter-spacing:0.1em;
  }
</style>
</head>
<body class="intro-active">

  <div id="loading">awakening the garden…</div>

  <div id="intro">
    <div id="intro-content">
      <h1 id="intro-logo">Where Feelings Bloom</h1>
      <p id="intro-tagline">a moonlit garden waiting to bloom</p>
      <button id="enter-btn" type="button">Enter the garden</button>
    </div>
  </div>

  <canvas id="scene-canvas"></canvas>

  <div id="top-controls">
    <button id="auto-btn" class="ctrl-btn" type="button">Auto Bloom</button>
    <button id="reset-btn" class="ctrl-btn" type="button">Clear garden</button>
  </div>

  <div id="ui">
    <div id="header" class="fade-in" style="animation-delay:0.3s;">
      <p id="title">Where Feelings Bloom</p>
      <p id="subtitle">a quiet garden that blooms at your touch</p>
    </div>
    <div id="footer" class="fade-in" style="animation-delay:0.8s;">
      <p id="instructions">Tap anywhere on the lake to bloom a flower &nbsp;·&nbsp; <span>drag</span> to look around &nbsp;·&nbsp; <span>scroll / pinch</span> to zoom</p>
      <p id="counter">0 flowers bloomed</p>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
(function(){
  "use strict";

  /* ============================== SETUP ============================== */

  const canvas = document.getElementById('scene-canvas');
  const counterEl = document.getElementById('counter');
  const instructionsEl = document.getElementById('instructions');
  const resetBtn = document.getElementById('reset-btn');
  const autoBtn = document.getElementById('auto-btn');
  const loadingEl = document.getElementById('loading');
  const introEl = document.getElementById('intro');
  const enterBtn = document.getElementById('enter-btn');

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha:false, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x060a14);
  scene.fog = new THREE.FogExp2(0x060a14, 0.032);

  const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.1, 220);

  /* ============================== CAMERA ORBIT ============================== */

  const target = new THREE.Vector3(0, 1.1, 0);
  let camTheta = Math.PI * 0.22;
  let camPhi   = Math.PI * 0.36;
  let camRadius = 10.5;
  const PHI_MIN = Math.PI * 0.16, PHI_MAX = Math.PI * 0.485;
  const RADIUS_MIN = 4.2, RADIUS_MAX = 19;
  let introActive = true;
  let cinematicActive = false;
  let cinematicStart = 0;
  const CINEMATIC_DURATION = 5200;
  let autoBloomActive = false;
  let autoBloomStart = 0;
  let autoBloomNextBloomAt = 0;
  let autoBloomBloomsDone = 0;
  const AUTO_BLOOM_TOTAL = 16;
  const AUTO_BLOOM_MIN_GAP = 420, AUTO_BLOOM_MAX_GAP = 880;

  function orbitCameraPosition(){
    return new THREE.Vector3(
      target.x + camRadius * Math.sin(camPhi) * Math.sin(camTheta),
      target.y + camRadius * Math.cos(camPhi),
      target.z + camRadius * Math.sin(camPhi) * Math.cos(camTheta)
    );
  }

  function updateCameraPosition(){
    camera.position.copy(orbitCameraPosition());
    camera.lookAt(target);
  }
  updateCameraPosition();

  /* ============================== LIGHTING ============================== */

  scene.add(new THREE.AmbientLight(0x4a6fa8, 0.55));

  const moonLight = new THREE.DirectionalLight(0xcfe3ff, 0.65);
  moonLight.position.set(18, 22, -14);
  scene.add(moonLight);

  const fillLight = new THREE.HemisphereLight(0x3a5a8a, 0x0a1018, 0.35);
  scene.add(fillLight);

  /* ============================== TEXTURE HELPERS ============================== */

  function makeGlowTexture(){
    const size = 128;
    const c = document.createElement('canvas'); c.width = c.height = size;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.25, 'rgba(255,255,255,0.7)');
    g.addColorStop(0.6, 'rgba(255,255,255,0.18)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,size,size);
    const tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
  }
  const glowTex = makeGlowTexture();

  function makeStarTexture(){
    const size = 32;
    const c = document.createElement('canvas'); c.width = c.height = size;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(0.4,'rgba(255,255,255,0.8)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,size,size);
    return new THREE.CanvasTexture(c);
  }
  const starTex = makeStarTexture();

  function makeLakeTexture(){
    const size = 1024;
    const c = document.createElement('canvas'); c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#000000';
    ctx.fillRect(0,0,size,size);
    for(let i=0;i<340;i++){
      const x = Math.random()*size, y = Math.random()*size;
      const w = 14 + Math.random()*58;
      const a = Math.random()*Math.PI;
      ctx.strokeStyle = `rgba(80,105,130,${(0.012+Math.random()*0.026).toFixed(3)})`;
      ctx.lineWidth = 0.25 + Math.random()*0.55;
      ctx.beginPath();
      ctx.ellipse(x, y, w, 0.5+Math.random()*1.2, a, 0, Math.PI*2);
      ctx.stroke();
    }
    const vg = ctx.createRadialGradient(size/2,size/2,size*0.12,size/2,size/2,size*0.5);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(0,0,0,0.9)');
    ctx.fillStyle = vg; ctx.fillRect(0,0,size,size);
    const tex = new THREE.CanvasTexture(c);
    tex.encoding = THREE.sRGBEncoding;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  function makeSkyTexture(){
    const w = 1024, h = 512;
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    const sky = ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0,'#02040c');
    sky.addColorStop(0.45,'#07112a');
    sky.addColorStop(1,'#060a14');
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,w,h);

    const galaxy = ctx.createLinearGradient(w*0.18,h*0.62,w*0.82,h*0.18);
    galaxy.addColorStop(0,'rgba(137,165,255,0)');
    galaxy.addColorStop(0.25,'rgba(137,165,255,0.14)');
    galaxy.addColorStop(0.5,'rgba(245,210,255,0.22)');
    galaxy.addColorStop(0.76,'rgba(116,196,255,0.13)');
    galaxy.addColorStop(1,'rgba(137,165,255,0)');
    ctx.save();
    ctx.translate(w/2,h/2);
    ctx.rotate(-0.22);
    ctx.fillStyle = galaxy;
    ctx.beginPath();
    ctx.ellipse(0, -18, w*0.52, h*0.12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    for(let i=0;i<230;i++){
      const x = Math.random()*w;
      const y = Math.random()*h*0.72;
      const r = Math.random() < 0.93 ? Math.random()*1.1+0.25 : Math.random()*2.0+0.9;
      ctx.fillStyle = `rgba(225,240,255,${(0.35+Math.random()*0.55).toFixed(2)})`;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.encoding = THREE.sRGBEncoding;
    tex.needsUpdate = true;
    return tex;
  }

  function makePetalTexture(throat, edge, speckle, speckleCount){
    const w = 256, h = 320;
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0, throat);
    grad.addColorStop(0.5, edge);
    grad.addColorStop(1, edge);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,w,h);
    // throat glow
    const rg = ctx.createRadialGradient(w/2, h*0.06, 2, w/2, h*0.06, h*0.55);
    rg.addColorStop(0, throat);
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = rg; ctx.fillRect(0,0,w,h);
    // speckles, biased toward the throat (top)
    for(let i=0;i<speckleCount;i++){
      const t = Math.pow(Math.random(), 1.6);
      const y = t * h * 0.62;
      const spread = (0.18 + t*0.85) * w * 0.5;
      const x = w/2 + (Math.random()*2-1) * spread;
      const r = 1.2 + Math.random()*3.2;
      ctx.fillStyle = speckle;
      ctx.globalAlpha = 0.35 + Math.random()*0.45;
      ctx.beginPath(); ctx.ellipse(x, y, r, r*0.8, Math.random()*Math.PI, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // soft central midrib highlight
    const mg = ctx.createLinearGradient(w*0.46,0,w*0.54,0);
    mg.addColorStop(0,'rgba(255,255,255,0)');
    mg.addColorStop(0.5,'rgba(255,255,255,0.16)');
    mg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = mg; ctx.fillRect(0,0,w,h);

    const tex = new THREE.CanvasTexture(c);
    tex.flipY = false;
    tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.encoding = THREE.sRGBEncoding;
    tex.needsUpdate = true;
    return tex;
  }

  function makeDiscTexture(colorHex){
    const size = 128;
    const c = document.createElement('canvas'); c.width = c.height = size;
    const ctx = c.getContext('2d');
    const base = new THREE.Color(colorHex);
    const light = base.clone().lerp(new THREE.Color(0xffffff), 0.4);
    const dark = base.clone().lerp(new THREE.Color(0x000000), 0.45);
    const g = ctx.createRadialGradient(size/2,size/2,2,size/2,size/2,size/2);
    g.addColorStop(0, '#'+light.getHexString());
    g.addColorStop(0.7, '#'+base.getHexString());
    g.addColorStop(1, '#'+dark.getHexString());
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(size/2,size/2,size/2,0,Math.PI*2); ctx.fill();
    for(let i=0;i<80;i++){
      const ang = Math.random()*Math.PI*2;
      const r = Math.random()*size*0.47;
      const x = size/2 + Math.cos(ang)*r, y = size/2 + Math.sin(ang)*r;
      ctx.fillStyle = Math.random() < 0.5 ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.arc(x, y, 0.7+Math.random()*1.2, 0, Math.PI*2); ctx.fill();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.encoding = THREE.sRGBEncoding;
    tex.needsUpdate = true;
    return tex;
  }

  /* ============================== LAKE, SKY, MOON ============================== */

  const skyDome = new THREE.Mesh(
    new THREE.SphereGeometry(92, 48, 32),
    new THREE.MeshBasicMaterial({ map: makeSkyTexture(), side: THREE.BackSide, depthWrite:false })
  );
  scene.add(skyDome);

  const groundGeo = new THREE.CircleGeometry(34, 96);
  const lakeTexture = makeLakeTexture();
  const groundMat = new THREE.MeshPhysicalMaterial({
    map: lakeTexture,
    color: 0x000000,
    roughness: 0.82,
    metalness: 0,
    clearcoat: 0.22,
    clearcoatRoughness: 0.7,
    reflectivity: 0.08
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  const reflectionTex = makeSkyTexture();
  reflectionTex.wrapS = reflectionTex.wrapT = THREE.RepeatWrapping;
  reflectionTex.repeat.set(1.9, 1.15);
  reflectionTex.offset.set(0.06, 0.1);
  const lakeReflection = new THREE.Mesh(
    new THREE.CircleGeometry(33.5, 96),
    new THREE.MeshBasicMaterial({
      map: reflectionTex,
      color: 0x9cc9ff,
      transparent:true,
      opacity:0,
      blending:THREE.AdditiveBlending,
      depthWrite:false
    })
  );
  lakeReflection.rotation.x = -Math.PI/2;
  lakeReflection.position.y = 0.008;
  lakeReflection.renderOrder = 1;
  scene.add(lakeReflection);

  // ground intersection plane (math only, invisible)
  const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);

  // starfield
  (function buildStars(){
    const count = 360;
    const positions = new Float32Array(count*3);
    for(let i=0;i<count;i++){
      const r = 60 + Math.random()*70;
      const theta = Math.random()*Math.PI*2;
      const phi = Math.random()*Math.PI*0.5;
      positions[i*3] = r*Math.sin(phi)*Math.cos(theta);
      positions[i*3+1] = Math.abs(r*Math.cos(phi)) * 0.6 + 8;
      positions[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
    const mat = new THREE.PointsMaterial({
      size: 1.25, map: starTex, transparent:true, opacity:0.55,
      color:0xcfe3ff, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true
    });
    scene.add(new THREE.Points(geo, mat));
  })();

  // crescent moon
  const moon = new THREE.Group();
  moon.position.set(22, 24, -30);
  scene.add(moon);
  const moonDisk = new THREE.Mesh(
    new THREE.CircleGeometry(2.55, 48),
    new THREE.MeshBasicMaterial({ color:0xeaf4ff, side:THREE.DoubleSide })
  );
  moon.add(moonDisk);
  const moonShade = new THREE.Mesh(
    new THREE.CircleGeometry(2.38, 48),
    new THREE.MeshBasicMaterial({ color:0x060a14, side:THREE.DoubleSide })
  );
  moonShade.position.set(0.82, 0.18, 0.03);
  moon.add(moonShade);
  const moonHalo = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex, color:0xbfe0ff, transparent:true, opacity:0.55,
    blending:THREE.AdditiveBlending, depthWrite:false
  }));
  moonHalo.scale.set(20,20,1);
  moon.add(moonHalo);
  moonLight.position.copy(moon.position);

  const moonReflection = new THREE.Group();
  moonReflection.position.set(9.5, 0.018, -13);
  moonReflection.rotation.x = -Math.PI/2;
  scene.add(moonReflection);
  const moonReflectionDisk = new THREE.Mesh(
    new THREE.CircleGeometry(1.25, 40),
    new THREE.MeshBasicMaterial({
      color:0xcfe8ff, transparent:true, opacity:0.035,
      blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.DoubleSide
    })
  );
  moonReflection.add(moonReflectionDisk);
  const moonReflectionShade = new THREE.Mesh(
    new THREE.CircleGeometry(1.16, 40),
    new THREE.MeshBasicMaterial({
      color:0x060a14, transparent:true, opacity:0.28,
      depthWrite:false, side:THREE.DoubleSide
    })
  );
  moonReflectionShade.position.set(0.42, 0.08, 0.01);
  moonReflection.add(moonReflectionShade);

  function easeInOutCubic(t){
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
  }

  function updateCinematicCamera(now){
    const rawT = Math.min((now - cinematicStart) / CINEMATIC_DURATION, 1);
    const moonPos = moon.position.clone();
    const startPos = moonPos.clone().add(new THREE.Vector3(0.25, 0.1, 5.2));
    const moonDriftPos = moonPos.clone().add(new THREE.Vector3(0.65, -0.22, 8.2));
    const gardenPos = orbitCameraPosition();
    const lookAtPoint = new THREE.Vector3();
    const cameraPos = new THREE.Vector3();

    if (rawT < 0.34){
      const t = easeInOutCubic(rawT / 0.34);
      cameraPos.lerpVectors(startPos, moonDriftPos, t);
      lookAtPoint.copy(moonPos);
      moon.scale.setScalar(1.72 - t*0.26);
    } else {
      const t = easeInOutCubic((rawT - 0.34) / 0.66);
      cameraPos.lerpVectors(moonDriftPos, gardenPos, t);
      lookAtPoint.lerpVectors(moonPos, target, t);
      moon.scale.setScalar(1.46 - t*0.46);
    }

    camera.position.copy(cameraPos);
    camera.lookAt(lookAtPoint);

    if (rawT >= 1){
      cinematicActive = false;
      moon.scale.setScalar(1);
      document.body.classList.remove('cinematic');
      lastInteraction = performance.now();
      updateCameraPosition();
    }
  }

  function enterGarden(){
    if (!introActive) return;
    introActive = false;
    cinematicActive = true;
    cinematicStart = performance.now();
    introEl.classList.add('entering');
    document.body.classList.remove('intro-active');
    document.body.classList.add('cinematic');
    enterBtn.disabled = true;
    setTimeout(() => { introEl.style.display = 'none'; }, 1200);
  }

  enterBtn.addEventListener('click', enterGarden);

  /* ============================== SHARED GEOMETRIES ============================== */

  function bendStrip(geo, length, curl, twist, profileFn){
    const pos = geo.attributes.position;
    const halfLen = length/2;
    for(let i=0;i<pos.count;i++){
      let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      const t = (y + halfLen)/length; // 0 base -> 1 tip
      const tc = Math.max(t,0);
      const widthProfile = profileFn(tc);
      x *= Math.max(widthProfile, 0.015);
      // gentle outward flare
      x *= (1 + tc*0.12);
      // midrib crease
      const crease = Math.cos(Math.min(Math.abs(x)*7,1)*Math.PI/2);
      let zLocal = z - crease*0.018*(0.3+0.7*tc);
      // slight twist
      const twistAngle = twist*tc;
      const xt = x*Math.cos(twistAngle) - zLocal*Math.sin(twistAngle)*0.3;
      zLocal = x*Math.sin(twistAngle)*0.3 + zLocal;
      x = xt;
      // recurve / cup bend about base pivot (negative curl cups inward)
      const dy = tc*length;
      const bend = curl*Math.pow(tc,1.7);
      const newDy = dy*Math.cos(bend) - zLocal*Math.sin(bend);
      const newZ  = dy*Math.sin(bend) + zLocal*Math.cos(bend);
      const newY = -halfLen + newDy;
      pos.setXYZ(i, x, newY, newZ);
    }
    geo.translate(0, halfLen, 0); // base sits at local origin
    pos.needsUpdate = true;
    geo.computeVertexNormals();
    return geo;
  }

  // lanceolate: narrow base, widest ~38%, pointed tip (lily)
  function profileLance(t){ return Math.pow(Math.sin(Math.PI*Math.pow(t,0.62)), 1.05); }
  // rounded / spoon-shaped: stays wide longer, blunt rounded tip (tulip, rose)
  function profileRound(t){ return Math.pow(Math.sin(Math.PI*Math.pow(t,0.5)), 0.55); }
  // thin ray floret: parallel sides, small tapered tip (daisy)
  function profileRay(t){
    const riseEnd = 0.1, fallStart = 0.82;
    if (t < riseEnd) return Math.sin((t/riseEnd)*Math.PI/2);
    if (t > fallStart) return Math.max(0.05, 1-((t-fallStart)/(1-fallStart))*0.95);
    return 1;
  }

  function createTepalGeometry(length, width, curl, twist, profileFn){
    const geo = new THREE.PlaneGeometry(width, length, 8, 18);
    return bendStrip(geo, length, curl, twist, profileFn || profileLance);
  }

  const OUTER_LEN=1.05, OUTER_WIDTH=0.46, OUTER_CURL=1.95, OUTER_TWIST=0.18;
  const INNER_LEN=0.88, INNER_WIDTH=0.38, INNER_CURL=1.55, INNER_TWIST=0.12;
  const outerTepalGeo = createTepalGeometry(OUTER_LEN, OUTER_WIDTH, OUTER_CURL, OUTER_TWIST, profileLance);
  const innerTepalGeo = createTepalGeometry(INNER_LEN, INNER_WIDTH, INNER_CURL, INNER_TWIST, profileLance);

  const leafGeo = createTepalGeometry(0.62, 0.16, 0.5, 0.05, profileLance);
  const leafMat = new THREE.MeshStandardMaterial({ color:0x2c5a3a, roughness:0.7, side:THREE.DoubleSide });
  const daisyPetalGeo = createTepalGeometry(0.5, 0.085, 0.16, 0.02, profileRay);
  const tulipPetalGeo = createTepalGeometry(0.74, 0.4, 0.45, 0.05, profileRound);

  // rose petals: four whorls, inner ones cup inward (negative curl), outer ones loosen and recurve
  const roseW1Geo = createTepalGeometry(0.2, 0.19, -0.95, 0.08, profileRound);
  const roseW2Geo = createTepalGeometry(0.3, 0.27, -0.6, 0.09, profileRound);
  const roseW3Geo = createTepalGeometry(0.4, 0.35, -0.28, 0.1, profileRound);
  const roseW4Geo = createTepalGeometry(0.5, 0.42, 0.18, 0.11, profileRound);
  const thornGeo = new THREE.ConeGeometry(0.018, 0.06, 5);
  thornGeo.translate(0, 0.03, 0);

  const stemGeo = new THREE.CylinderGeometry(0.022, 0.04, 1, 6, 1);
  stemGeo.translate(0, 0.5, 0); // base at origin
  const stemMat = new THREE.MeshStandardMaterial({ color:0x335c3f, roughness:0.75 });

  const pistilGeo = new THREE.CylinderGeometry(0.012, 0.016, 0.34, 6);
  pistilGeo.translate(0, 0.17, 0);
  const pistilTipGeo = new THREE.SphereGeometry(0.026, 8, 8);
  const pistilMat = new THREE.MeshStandardMaterial({ color:0xdcd8b8, roughness:0.5, emissive:0x554f2a, emissiveIntensity:0.25 });

  const stamenGeo = new THREE.CylinderGeometry(0.026, 0.008, 0.3, 6);
  stamenGeo.translate(0, 0.15, 0);
  const daisyCenterGeo = new THREE.SphereGeometry(0.13, 14, 10);
  const thornMat = new THREE.MeshStandardMaterial({ color:0x2f5234, roughness:0.7 });

  const sharedGlowSpriteMat = () => new THREE.SpriteMaterial({
    map: glowTex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
  });

  /* ============================== GARDEN BORDER ============================== */

  const gardenGroup = new THREE.Group();
  scene.add(gardenGroup);

  const bushGeo = new THREE.SphereGeometry(1, 12, 8);
  const budGeo = new THREE.SphereGeometry(0.055, 8, 6);
  const smallStemGeo = new THREE.CylinderGeometry(0.01, 0.018, 0.5, 5);
  smallStemGeo.translate(0, 0.25, 0);
  const bushMats = [
    new THREE.MeshStandardMaterial({ color:0x16351f, roughness:0.9 }),
    new THREE.MeshStandardMaterial({ color:0x214b2b, roughness:0.86 }),
    new THREE.MeshStandardMaterial({ color:0x102819, roughness:0.94 })
  ];
  const smallStemMat = new THREE.MeshStandardMaterial({ color:0x284d31, roughness:0.8 });
  const borderFlowerMats = [0xf4f0df, 0x9f72db, 0xffd35a, 0xf0e8ff, 0xd92c45].map(color =>
    new THREE.MeshStandardMaterial({ color, roughness:0.55, emissive:color, emissiveIntensity:0.04 })
  );

  function addSmallFlowerCluster(parent, x, z, count, spread){
    for(let i=0;i<count;i++){
      const stem = new THREE.Mesh(smallStemGeo, smallStemMat);
      const ox = (Math.random()-0.5)*spread;
      const oz = (Math.random()-0.5)*spread;
      const h = 0.32 + Math.random()*0.42;
      stem.position.set(x+ox, 0.02, z+oz);
      stem.rotation.z = (Math.random()-0.5)*0.22;
      stem.rotation.x = (Math.random()-0.5)*0.18;
      stem.scale.y = h;
      parent.add(stem);

      const bloom = new THREE.Mesh(budGeo, borderFlowerMats[Math.floor(Math.random()*borderFlowerMats.length)]);
      bloom.position.set(x+ox, h*0.5 + 0.28, z+oz);
      bloom.scale.setScalar(0.8 + Math.random()*0.75);
      parent.add(bloom);
    }
  }

  function buildGardenBorder(){
    const clusterCount = 30;
    for(let i=0;i<clusterCount;i++){
      const angle = (i/clusterCount)*Math.PI*2 + (Math.random()-0.5)*0.08;
      const radius = 16.4 + Math.random()*8.4;
      const x = Math.cos(angle)*radius;
      const z = Math.sin(angle)*radius;
      const bush = new THREE.Group();
      bush.position.set(x, 0, z);
      bush.rotation.y = -angle + Math.PI/2;
      gardenGroup.add(bush);

      const lobes = 3 + Math.floor(Math.random()*4);
      for(let j=0;j<lobes;j++){
        const mound = new THREE.Mesh(bushGeo, bushMats[Math.floor(Math.random()*bushMats.length)]);
        mound.position.set((Math.random()-0.5)*1.3, 0.22 + Math.random()*0.22, (Math.random()-0.5)*1.0);
        mound.scale.set(0.72 + Math.random()*0.65, 0.28 + Math.random()*0.28, 0.55 + Math.random()*0.45);
        bush.add(mound);
      }

      if (Math.random() < 0.86){
        addSmallFlowerCluster(bush, 0, -0.1, 5 + Math.floor(Math.random()*8), 1.2 + Math.random()*0.8);
      }
    }

    for(let i=0;i<9;i++){
      const angle = Math.random()*Math.PI*2;
      const radius = 7.5 + Math.random()*6.8;
      addSmallFlowerCluster(gardenGroup, Math.cos(angle)*radius, Math.sin(angle)*radius, 5 + Math.floor(Math.random()*5), 0.55);
    }
  }

  buildGardenBorder();

  /* ============================== FLOWER VARIETIES ============================== */

  // Flower types available for blooming in the garden.
  // These are the distinct shapes/styles that the bloom factory can create.
  const FLOWER_TYPES = ['Lily', 'Daisy', 'Tulip', 'Rose'];

  // Color varieties used for petal textures and stamen accents.
  // Each entry defines a named palette and the colors used when generating flower materials.
  const COLOR_VARIETIES = [
    { name:'White', throat:'#fff6d8', edge:'#fffdf5', speckle:'rgba(255,255,255,0)', glow:0xfff4cf, stamen:0xcaa550 },
    { name:'Purple', throat:'#5e2ca5', edge:'#9b6ee8', speckle:'#2b124f', glow:0xa875ff, stamen:0x3b1d63 },
    { name:'White Red Dots', throat:'#fff4df', edge:'#fffdf7', speckle:'#a41018', glow:0xffefe2, stamen:0x8b1a1a },
    { name:'Yellow', throat:'#f5b819', edge:'#ffe681', speckle:'#8c5600', glow:0xffdb58, stamen:0x7a4b00 },
    { name:'Purple White Fade', throat:'#7d4dcc', edge:'#f4edff', speckle:'#4d247d', glow:0xc7a5ff, stamen:0x47246d },
    { name:'Red', throat:'#8f0614', edge:'#ff3854', speckle:'#3d0008', glow:0xff405a, stamen:0x4a0509 },
  ];

  // Cache created textures for each color variety for reuse across flower meshes.
  const varietyTexCache = COLOR_VARIETIES.map(v => makePetalTexture(v.throat, v.edge, v.speckle, 46));
  const daisyDiscCache = COLOR_VARIETIES.map(v => makeDiscTexture(v.stamen));

  let bloomQueue = [];
  let lastComboKey = '';

  function shuffleList(list){
    for(let i=list.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [list[i], list[j]] = [list[j], list[i]];
    }
    return list;
  }

  function refillBloomQueue(){
    bloomQueue = shuffleList(FLOWER_TYPES.flatMap(type =>
      COLOR_VARIETIES.map((color, colorIdx) => ({ type, color, colorIdx, key:`${type}:${color.name}` }))
    ));
    if (bloomQueue.length > 1 && bloomQueue[bloomQueue.length-1].key === lastComboKey){
      [bloomQueue[bloomQueue.length-1], bloomQueue[0]] = [bloomQueue[0], bloomQueue[bloomQueue.length-1]];
    }
  }

  function nextBloomChoice(){
    if (!bloomQueue.length) refillBloomQueue();
    const choice = bloomQueue.pop();
    lastComboKey = choice.key;
    return choice;
  }

  /* ============================== FLOWER FACTORY ============================== */

  const flowers = [];
  const litFlowers = [];
  const MAX_FLOWERS = 30;
  const MAX_LIT = 6;
  let totalBloomed = 0;

  const particles = [];
  const MAX_PARTICLES = 140;
  const particlePool = [];

  const ripples = [];
  const rippleGeo = new THREE.RingGeometry(0.94, 1, 96);
  const rippleMat = () => new THREE.MeshBasicMaterial({
    color:0xcfe8ff,
    transparent:true,
    opacity:0,
    blending:THREE.AdditiveBlending,
    depthWrite:false,
    side:THREE.DoubleSide
  });

  function spawnRipple(position, color){
    for(let i=0;i<3;i++){
      const ring = new THREE.Mesh(rippleGeo, rippleMat());
      ring.rotation.x = -Math.PI/2;
      ring.position.set(position.x, 0.026 + i*0.003, position.z);
      ring.material.color.setHex(i === 0 ? color : 0xcfe8ff);
      ring.renderOrder = 2;
      scene.add(ring);
      ripples.push({
        ring,
        life: -i*0.18,
        maxLife: 2.35 + i*0.32,
        startScale: 0.08 + i*0.05,
        endScale: 2.9 + i*0.75,
        baseOpacity: i === 0 ? 0.38 : 0.24
      });
    }
  }

  function updateRipples(dt){
    for(let i=ripples.length-1;i>=0;i--){
      const r = ripples[i];
      r.life += dt;
      if (r.life < 0) continue;
      const t = Math.min(r.life / r.maxLife, 1);
      if (t >= 1){
        scene.remove(r.ring);
        r.ring.material.dispose();
        ripples.splice(i,1);
        continue;
      }
      const eased = easeOutCubic(t);
      const scale = THREE.MathUtils.lerp(r.startScale, r.endScale, eased);
      r.ring.scale.set(scale, scale, 1);
      r.ring.material.opacity = r.baseOpacity * Math.pow(1-t, 1.5);
    }
  }

  function spawnParticle(position, color){
    if (particles.length >= MAX_PARTICLES) return;
    let sprite = particlePool.pop();
    if (!sprite){
      sprite = new THREE.Sprite(sharedGlowSpriteMat());
    }
    sprite.material.color.setHex(color);
    sprite.material.opacity = 0.0;
    sprite.position.copy(position);
    const scale = 0.06 + Math.random()*0.07;
    sprite.scale.set(scale, scale, 1);
    scene.add(sprite);
    particles.push({
      sprite,
      vel: new THREE.Vector3((Math.random()-0.5)*0.12, 0.25+Math.random()*0.28, (Math.random()-0.5)*0.12),
      life: 0,
      maxLife: 1.8 + Math.random()*1.4,
      baseOpacity: 0.55 + Math.random()*0.35
    });
  }

  function updateParticles(dt){
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.life += dt;
      const t = p.life / p.maxLife;
      if (t >= 1){
        scene.remove(p.sprite);
        particlePool.push(p.sprite);
        particles.splice(i,1);
        continue;
      }
      p.sprite.position.addScaledVector(p.vel, dt);
      p.vel.y += dt*0.02;
      p.sprite.material.opacity = p.baseOpacity * Math.sin(Math.PI * t) ;
    }
  }

  function buildPetalWhorl(geo, count, radius, count_offset, material, restRotX, closedRotX, delay, list){
    for(let i=0;i<count;i++){
      const pivot = new THREE.Object3D();
      pivot.rotation.order = 'YXZ';
      pivot.rotation.y = count_offset + (i/count)*Math.PI*2 + (Math.random()-0.5)*0.05;
      pivot.rotation.x = closedRotX;
      pivot.rotation.z = (Math.random()-0.5)*0.06;
      const mesh = new THREE.Mesh(geo, material);
      const jitter = 0.93 + Math.random()*0.14;
      mesh.scale.set(jitter, 0.95 + Math.random()*0.12, jitter);
      pivot.add(mesh);
      pivot.userData.openX = restRotX + (Math.random()-0.5)*0.06;
      pivot.userData.closedX = closedRotX;
      pivot.userData.delay = delay + Math.random()*0.05;
      list.push(pivot);
    }
  }

  function makeBloomMaterials(variety, textureIdx){
    const petalMat = new THREE.MeshPhysicalMaterial({
      map: textureIdx === null ? null : varietyTexCache[textureIdx],
      color: textureIdx === null ? new THREE.Color(variety.edge) : 0xffffff,
      side: THREE.DoubleSide,
      roughness: 0.38,
      metalness: 0,
      clearcoat: 0.35,
      clearcoatRoughness: 0.45,
      emissive: new THREE.Color(variety.glow),
      emissiveIntensity: 0.12,
    });
    const stamenMat = new THREE.MeshStandardMaterial({
      color: variety.stamen, roughness:0.5,
      emissive: new THREE.Color(variety.glow), emissiveIntensity:0.5
    });
    return { petalMat, stamenMat };
  }

  function makeStemmedGroup(position, stemHeight){
    const group = new THREE.Group();
    group.position.copy(position);
    group.rotation.y = Math.random()*Math.PI*2;
    scene.add(group);

    const stem = new THREE.Mesh(stemGeo, stemMat);
    stem.scale.y = stemHeight;
    stem.rotation.x = (Math.random()-0.5)*0.05;
    stem.rotation.z = (Math.random()-0.5)*0.05;
    group.add(stem);

    const leaf = new THREE.Mesh(leafGeo, leafMat);
    leaf.position.y = stemHeight*0.35;
    leaf.rotation.y = Math.random()*Math.PI*2;
    leaf.rotation.x = -0.9;
    leaf.scale.setScalar(0.001);
    group.add(leaf);

    const leaf2 = new THREE.Mesh(leafGeo, leafMat);
    leaf2.position.y = stemHeight*0.58;
    leaf2.rotation.y = Math.random()*Math.PI*2;
    leaf2.rotation.x = -0.9;
    leaf2.scale.setScalar(0.001);
    group.add(leaf2);

    const head = new THREE.Group();
    head.position.y = stemHeight;
    head.rotation.z = (Math.random()-0.5)*0.08;
    head.scale.setScalar(0.001);
    group.add(head);

    return { group, stem, leaf, leaf2, head };
  }

  function addBloomHalo(head, color){
    const halo = new THREE.Sprite(sharedGlowSpriteMat());
    halo.material.color.setHex(color);
    halo.material.opacity = 0;
    halo.scale.set(0.01,0.01,1);
    head.add(halo);
    return halo;
  }

  function makeFlowerRecord(parts, variety, materials, pivots, stamenTips, type){
    return {
      group: parts.group, head: parts.head, stem: parts.stem, leaf: parts.leaf, leaf2: parts.leaf2,
      pivots, halo: addBloomHalo(parts.head, variety.glow),
      petalMat: materials.petalMat, stamenMat: materials.stamenMat,
      materials: [materials.petalMat, materials.stamenMat],
      stamenTips, light:null, glowColor: variety.glow,
      type, baseTiltZ: parts.head.rotation.z,
      age: 0,
      bloomDuration: 1.5 + Math.random()*0.5,
      pulsePhase: Math.random()*Math.PI*2,
      lastParticleT: 0,
      settled: false,
      removing: false,
      removeT: 0,
    };
  }

  function createLily(position, variety, colorIdx){
    const stemHeight = 1.5 + Math.random()*0.6;
    const parts = makeStemmedGroup(position, stemHeight);
    const { petalMat, stamenMat } = makeBloomMaterials(variety, colorIdx);

    const pivots = [];
    buildPetalWhorl(outerTepalGeo, 3, 0, 0, petalMat, -1.92, 0.05, 0.28, pivots);
    buildPetalWhorl(innerTepalGeo, 3, 0, Math.PI/3, petalMat, -1.6, 0.02, 0.5, pivots);
    pivots.forEach(p => parts.head.add(p));

    // pistil
    const pistil = new THREE.Mesh(pistilGeo, pistilMat);
    parts.head.add(pistil);
    const pistilTip = new THREE.Mesh(pistilTipGeo, pistilMat);
    pistilTip.position.y = 0.34;
    parts.head.add(pistilTip);

    // stamens
    const stamenTips = [];
    for(let i=0;i<6;i++){
      const s = new THREE.Mesh(stamenGeo, stamenMat);
      const ang = (i/6)*Math.PI*2;
      s.rotation.y = ang;
      s.rotation.x = -1.0 - Math.random()*0.15;
      parts.head.add(s);
      const tip = new THREE.Vector3(0,0.3,0).applyEuler(s.rotation);
      stamenTips.push(tip);
    }

    return makeFlowerRecord(parts, variety, { petalMat, stamenMat }, pivots, stamenTips, 'Lily');
  }

  function createDaisy(position, variety, colorIdx){
    const stemHeight = 1.05 + Math.random()*0.38;
    const parts = makeStemmedGroup(position, stemHeight);
    parts.head.rotation.x = -0.2;
    const { petalMat, stamenMat } = makeBloomMaterials(variety, colorIdx);
    const pivots = [];
    buildPetalWhorl(daisyPetalGeo, 14, 0, 0, petalMat, -1.35, 0.75, 0.3, pivots);
    pivots.forEach(p => parts.head.add(p));

    stamenMat.map = daisyDiscCache[colorIdx];
    stamenMat.color.set(0xffffff);
    stamenMat.needsUpdate = true;
    const center = new THREE.Mesh(daisyCenterGeo, stamenMat);
    center.position.y = 0.04;
    center.scale.set(1, 0.55, 1);
    parts.head.add(center);

    return makeFlowerRecord(parts, variety, { petalMat, stamenMat }, pivots, [new THREE.Vector3(0,0.12,0)], 'Daisy');
  }

  function createTulip(position, variety, colorIdx){
    const stemHeight = 1.25 + Math.random()*0.45;
    const parts = makeStemmedGroup(position, stemHeight);
    const { petalMat, stamenMat } = makeBloomMaterials(variety, colorIdx);
    const pivots = [];
    buildPetalWhorl(tulipPetalGeo, 3, 0, 0, petalMat, -0.95, 0.15, 0.24, pivots);
    buildPetalWhorl(tulipPetalGeo, 3, 0, Math.PI/3, petalMat, -0.78, 0.08, 0.42, pivots);
    pivots.forEach(p => {
      p.scale.set(0.92, 0.92, 0.92);
      parts.head.add(p);
    });

    const center = new THREE.Mesh(pistilTipGeo, stamenMat);
    center.position.y = 0.12;
    center.scale.setScalar(1.6);
    parts.head.add(center);

    return makeFlowerRecord(parts, variety, { petalMat, stamenMat }, pivots, [new THREE.Vector3(0,0.24,0)], 'Tulip');
  }

  function createRose(position, variety, colorIdx){
    const stemHeight = 1.3 + Math.random()*0.5;
    const parts = makeStemmedGroup(position, stemHeight);
    const { petalMat, stamenMat } = makeBloomMaterials(variety, colorIdx);

    const pivots = [];
    buildPetalWhorl(roseW1Geo, 4, 0, 0,          petalMat, -0.42, -0.04, 0.14, pivots);
    buildPetalWhorl(roseW2Geo, 5, 0, 0.52,       petalMat, -0.7,  -0.02, 0.3,  pivots);
    buildPetalWhorl(roseW3Geo, 6, 0, 0.2,        petalMat, -1.0,  0.0,  0.46, pivots);
    buildPetalWhorl(roseW4Geo, 7, 0, 0.66,       petalMat, -1.32, 0.03, 0.62, pivots);
    pivots.forEach(p => parts.head.add(p));

    // tight inner bud nub, mostly hidden once the center whorls open
    const bud = new THREE.Mesh(pistilTipGeo, petalMat);
    bud.position.y = 0.06;
    bud.scale.setScalar(2.6);
    parts.head.add(bud);

    // a couple of thorns along the stem for a touch of realism
    const thornCount = 1 + Math.floor(Math.random()*2);
    for(let i=0;i<thornCount;i++){
      const thorn = new THREE.Mesh(thornGeo, thornMat);
      const h = (0.18 + Math.random()*0.55) * stemHeight;
      thorn.position.set(0, h, 0);
      thorn.rotation.y = Math.random()*Math.PI*2;
      thorn.rotation.z = Math.PI*0.42 + (Math.random()-0.5)*0.2;
      parts.group.add(thorn);
    }

    return makeFlowerRecord(parts, variety, { petalMat, stamenMat }, pivots, [new THREE.Vector3(0,0.16,0)], 'Rose');
  }

  function createBloom(position, choice){
    if (choice.type === 'Daisy') return createDaisy(position, choice.color, choice.colorIdx);
    if (choice.type === 'Tulip') return createTulip(position, choice.color, choice.colorIdx);
    if (choice.type === 'Rose') return createRose(position, choice.color, choice.colorIdx);
    return createLily(position, choice.color, choice.colorIdx);
  }

  function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }
  function easeOutBack(t){
    const c1 = 1.4, c3 = c1+1;
    return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
  }

  function grantLight(flower){
    if (litFlowers.length >= MAX_LIT){
      const old = litFlowers.shift();
      if (old.light){ old.head.remove(old.light); old.light = null; }
    }
    const light = new THREE.PointLight(flower.glowColor, 0, 3.2, 2);
    light.position.set(0,0,0);
    flower.head.add(light);
    flower.light = light;
    litFlowers.push(flower);
  }

  function removeFlower(flower){
    scene.remove(flower.group);
    const idx = flowers.indexOf(flower);
    if (idx>=0) flowers.splice(idx,1);
    const lidx = litFlowers.indexOf(flower);
    if (lidx>=0) litFlowers.splice(lidx,1);
    flower.materials.forEach(mat => mat.dispose());
  }

  function bloomAt(point){
    const choice = nextBloomChoice();
    const flower = createBloom(point, choice);
    flowers.push(flower);
    spawnRipple(point, choice.color.glow);
    grantLight(flower);
    totalBloomed++;
    counterEl.textContent = totalBloomed + (totalBloomed===1 ? ' flower bloomed' : ' flowers bloomed');
    if (instructionsEl) instructionsEl.style.opacity = '0.55';

    if (flowers.length > MAX_FLOWERS){
      const oldest = flowers.find(f => !f.removing);
      if (oldest){
        oldest.removing = true;
        oldest.removeT = 0;
      }
    }
  }

  function clearGarden(){
    if (autoBloomActive) stopAutoBloom();
    flowers.slice().forEach(removeFlower);
    flowers.length = 0; litFlowers.length = 0;
    particles.slice().forEach(p => { scene.remove(p.sprite); });
    particles.length = 0;
    ripples.slice().forEach(r => {
      scene.remove(r.ring);
      r.ring.material.dispose();
    });
    ripples.length = 0;
    bloomQueue.length = 0;
    lastComboKey = '';
    totalBloomed = 0;
    counterEl.textContent = '0 flowers bloomed';
  }

  /* ============================== AUTO BLOOM (RANDOMIZER TOUR) ============================== */

  function randomGardenPoint(){
    const angle = Math.random()*Math.PI*2;
    const r = 2.2 + Math.sqrt(Math.random())*12.8;
    return new THREE.Vector3(Math.cos(angle)*r, 0, Math.sin(angle)*r);
  }

  function startAutoBloom(){
    if (introActive || cinematicActive || autoBloomActive) return;
    autoBloomActive = true;
    autoBloomBloomsDone = 0;
    autoBloomStart = performance.now();
    autoBloomNextBloomAt = autoBloomStart + 200;
    autoBtn.textContent = 'Stop Auto Bloom';
    autoBtn.classList.add('active');
    isDragging = false;
    canvas.classList.remove('dragging');
    lastInteraction = performance.now();
  }

  function stopAutoBloom(){
    if (!autoBloomActive) return;
    autoBloomActive = false;
    autoBtn.textContent = 'Auto Bloom';
    autoBtn.classList.remove('active');
    lastInteraction = performance.now();
  }

  function updateAutoBloom(now, dt){
    const elapsed = (now - autoBloomStart) / 1000;
    camTheta += dt * 0.085;
    camPhi = THREE.MathUtils.lerp(Math.PI*0.30, Math.PI*0.435, 0.5+0.5*Math.sin(elapsed*0.18));
    camRadius = THREE.MathUtils.lerp(8.0, 13.8, 0.5+0.5*Math.sin(elapsed*0.11 + 1.3));

    if (autoBloomBloomsDone < AUTO_BLOOM_TOTAL && now >= autoBloomNextBloomAt){
      bloomAt(randomGardenPoint());
      autoBloomBloomsDone++;
      autoBloomNextBloomAt = now + AUTO_BLOOM_MIN_GAP + Math.random()*(AUTO_BLOOM_MAX_GAP-AUTO_BLOOM_MIN_GAP);
    }
    if (autoBloomBloomsDone >= AUTO_BLOOM_TOTAL && now >= autoBloomNextBloomAt){
      stopAutoBloom();
    }
  }

  autoBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (autoBloomActive) stopAutoBloom(); else startAutoBloom();
  });

  /* ============================== AMBIENT FIREFLIES ============================== */

  const fireflies = [];
  (function buildFireflies(){
    for(let i=0;i<22;i++){
      const sprite = new THREE.Sprite(sharedGlowSpriteMat());
      const hue = Math.random() < 0.5 ? 0xcfe3ff : 0xe8c178;
      sprite.material.color.setHex(hue);
      const s = 0.05 + Math.random()*0.05;
      sprite.scale.set(s,s,1);
      const ang = Math.random()*Math.PI*2;
      const r = 4 + Math.random()*20;
      const base = new THREE.Vector3(Math.cos(ang)*r, 0.3+Math.random()*2.4, Math.sin(ang)*r);
      sprite.position.copy(base);
      scene.add(sprite);
      fireflies.push({ sprite, base, phase: Math.random()*Math.PI*2, speed: 0.3+Math.random()*0.4, radius: 0.6+Math.random()*0.8 });
    }
  })();

  function updateFireflies(t){
    fireflies.forEach(f => {
      f.sprite.position.x = f.base.x + Math.cos(t*f.speed + f.phase)*f.radius;
      f.sprite.position.z = f.base.z + Math.sin(t*f.speed*0.8 + f.phase)*f.radius;
      f.sprite.position.y = f.base.y + Math.sin(t*f.speed*1.3 + f.phase)*0.4;
      f.sprite.material.opacity = 0.25 + 0.35*Math.max(0, Math.sin(t*f.speed*2 + f.phase));
    });
  }

  /* ============================== POINTER / ORBIT INTERACTION ============================== */

  const activePointers = new Map();
  let dragLast = null;
  let dragMoved = 0;
  let pinchStartDist = null;
  let pinchStartRadius = camRadius;
  let lastInteraction = performance.now();
  let isDragging = false;

  function ndcFromEvent(e){
    return {
      x: (e.clientX / window.innerWidth) * 2 - 1,
      y: -(e.clientY / window.innerHeight) * 2 + 1
    };
  }

  function tryBloomAtScreen(x, y){
    if (introActive || cinematicActive || autoBloomActive) return;
    const ndc = { x: (x/window.innerWidth)*2-1, y: -(y/window.innerHeight)*2+1 };
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(ndc, camera);
    const hit = new THREE.Vector3();
    const ok = raycaster.ray.intersectPlane(groundPlane, hit);
    if (!ok) return;
    const maxR = 15.5;
    const dist = Math.hypot(hit.x, hit.z);
    if (dist > maxR){
      hit.x *= maxR/dist; hit.z *= maxR/dist;
    }
    bloomAt(hit);
  }

  canvas.addEventListener('pointerdown', (e) => {
    if (introActive || cinematicActive || autoBloomActive) return;
    canvas.setPointerCapture(e.pointerId);
    activePointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    lastInteraction = performance.now();
    if (activePointers.size === 1){
      dragLast = { x:e.clientX, y:e.clientY };
      dragMoved = 0;
      isDragging = false;
    } else if (activePointers.size === 2){
      const pts = Array.from(activePointers.values());
      pinchStartDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      pinchStartRadius = camRadius;
      isDragging = true;
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!activePointers.has(e.pointerId)) return;
    activePointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    lastInteraction = performance.now();

    if (activePointers.size === 2){
      const pts = Array.from(activePointers.values());
      const d = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      if (pinchStartDist){
        const ratio = pinchStartDist / Math.max(d, 1);
        camRadius = Math.min(RADIUS_MAX, Math.max(RADIUS_MIN, pinchStartRadius * ratio));
      }
      return;
    }

    if (activePointers.size === 1 && dragLast){
      const dx = e.clientX - dragLast.x;
      const dy = e.clientY - dragLast.y;
      dragMoved += Math.hypot(dx,dy);
      if (dragMoved > 6){
        isDragging = true;
        canvas.classList.add('dragging');
      }
      if (isDragging){
        camTheta -= dx * 0.0042;
        camPhi   -= dy * 0.0042;
        camPhi = Math.min(PHI_MAX, Math.max(PHI_MIN, camPhi));
      }
      dragLast = { x:e.clientX, y:e.clientY };
    }
  });

  function handlePointerUp(e){
    const wasSingle = activePointers.size === 1;
    const wasDragging = isDragging;
    const moved = dragMoved;
    activePointers.delete(e.pointerId);
    canvas.classList.remove('dragging');
    if (activePointers.size === 0){
      if (wasSingle && !wasDragging && moved <= 6){
        tryBloomAtScreen(e.clientX, e.clientY);
      }
      dragLast = null;
      isDragging = false;
      pinchStartDist = null;
    } else if (activePointers.size === 1){
      const remaining = Array.from(activePointers.values())[0];
      dragLast = { x: remaining.x, y: remaining.y };
      isDragging = true;
    }
    lastInteraction = performance.now();
  }
  canvas.addEventListener('pointerup', handlePointerUp);
  canvas.addEventListener('pointercancel', handlePointerUp);

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    camRadius = Math.min(RADIUS_MAX, Math.max(RADIUS_MIN, camRadius + e.deltaY*0.012));
    lastInteraction = performance.now();
  }, { passive:false });

  resetBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    clearGarden();
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ============================== ANIMATION LOOP ============================== */

  const clock = new THREE.Clock();

  function updateFlower(flower, dt, elapsedTotal){
    if (flower.removing){
      flower.removeT += dt;
      const t = Math.min(flower.removeT/0.8, 1);
      const s = Math.max(0, 1-t);
      flower.group.scale.setScalar(s);
      if (flower.light) flower.light.intensity *= (1-dt*3);
      if (t>=1){ removeFlower(flower); }
      return;
    }

    flower.age += dt;
    const t = Math.min(flower.age / flower.bloomDuration, 1);

    // stem grows first
    const stemT = easeOutCubic(Math.min(t/0.4, 1));
    flower.group.scale.setScalar(Math.min(1, 0.15+stemT*0.85));

    const leafT = easeOutCubic(Math.min(Math.max((t-0.05)/0.35,0),1));
    flower.leaf.scale.setScalar(Math.max(0.001, leafT));
    flower.leaf2.scale.setScalar(Math.max(0.001, leafT*0.85));

    const headT = easeOutCubic(Math.min(Math.max((t-0.2)/0.4,0),1));
    flower.head.scale.setScalar(Math.max(0.001, headT));

    // petals open with per-whorl stagger
    flower.pivots.forEach((p) => {
      const dur = 0.55;
      const pt = Math.min(Math.max((t-p.userData.delay)/dur, 0), 1);
      const eased = easeOutBack(pt);
      p.rotation.x = THREE.MathUtils.lerp(p.userData.closedX, p.userData.openX, eased);
    });

    if (t>=1){
      if (!flower.settled){ flower.settled = true; }
      const pulse = 0.5 + 0.5*Math.sin(elapsedTotal*1.6 + flower.pulsePhase);
      const baseEmissive = 0.12 + pulse*0.22;
      flower.petalMat.emissiveIntensity = baseEmissive;
      flower.stamenMat.emissiveIntensity = 0.4 + pulse*0.5;
      flower.halo.material.opacity = (0.25 + pulse*0.3);
      const haloScale = 0.55 + pulse*0.12;
      flower.halo.scale.set(haloScale, haloScale, 1);
      if (flower.light){
        flower.light.intensity = 0.55 + pulse*0.85;
      }
      // gentle sway
      flower.head.rotation.z = flower.baseTiltZ + Math.sin(elapsedTotal*0.6 + flower.pulsePhase)*0.025;

      // occasional pollen particle
      flower.lastParticleT += dt;
      if (flower.lastParticleT > 0.35 + Math.random()*0.5){
        flower.lastParticleT = 0;
        if (Math.random() < 0.85){
          const tipLocal = flower.stamenTips[Math.floor(Math.random()*flower.stamenTips.length)];
          const worldPos = tipLocal.clone();
          flower.head.localToWorld(worldPos);
          spawnParticle(worldPos, flower.glowColor);
        }
      }
    } else {
      flower.halo.scale.setScalar(headT*0.4);
      flower.halo.material.opacity = headT*0.3;
      if (flower.light) flower.light.intensity = headT*0.6;
    }
  }

  function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    const elapsedTotal = clock.elapsedTime;
    const now = performance.now();

    if (cinematicActive){
      updateCinematicCamera(now);
    } else if (autoBloomActive){
      updateAutoBloom(now, dt);
      updateCameraPosition();
    } else {
      // idle auto-rotate
      if (!isDragging && now - lastInteraction > 4200){
        camTheta += dt * 0.045;
      }
      updateCameraPosition();
    }

    flowers.forEach(f => updateFlower(f, dt, elapsedTotal));
    updateParticles(dt);
    updateRipples(dt);
    updateFireflies(elapsedTotal);

    lakeTexture.offset.x += dt*0.006;
    lakeTexture.offset.y += dt*0.002;
    reflectionTex.offset.x -= dt*0.0025;
    lakeReflection.material.opacity = 0;
    moon.lookAt(camera.position);
    moonReflection.rotation.z = Math.sin(elapsedTotal*0.22)*0.045;
    moonReflection.scale.set(1 + Math.sin(elapsedTotal*0.36)*0.035, 0.72 + Math.cos(elapsedTotal*0.4)*0.025, 1);

    renderer.render(scene, camera);
  }

  // reveal
  requestAnimationFrame(() => {
    loadingEl.style.opacity = '0';
    setTimeout(() => { loadingEl.style.display = 'none'; }, 850);
  });

  animate();

})();
</script>
</body>
